name: Notify Release

on:
  push:
    tags:
      - 'v*'

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Post release to Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C0BJC4CQ9FT
        run: |
          TAG="${{ github.ref_name }}"
          COMMIT_URL="https://github.com/arjf/susegad-courthouse/commit/${{ github.sha }}"
          REPO_URL="https://github.com/arjf/susegad-courthouse/releases/tag/${TAG}"

          curl -s -X POST \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            https://slack.com/api/chat.postMessage \
            -d "$(cat <<EOF
          {
            "channel": "$SLACK_CHANNEL",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":rocket: *New release: ${TAG}*\n<${REPO_URL}|Release notes> | <${COMMIT_URL}|Commit>"
                }
              }
            ],
            "text": "New release: ${TAG}"
          }
          EOF
          )"
